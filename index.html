<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NMS REFINER</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- 背景 -->
<div id="background"></div>

<!-- 起動画面 -->
<div id="boot">

    <div class="bootLogo">
        ATLAS INTERFACE
    </div>

    <div id="bootText">
        INITIALIZING...
    </div>

    <div class="progress">
        <div id="progressBar"></div>
    </div>

</div>

<!-- メイン画面 -->
<div id="main">

<header>

    <div class="statusLeft">
        ATLAS NETWORK
    </div>

    <div class="statusRight">
        ONLINE
    </div>

</header>

<main>

    <!-- タイトル -->
    <div class="titleArea">

        <div class="titleLine"></div>

        <h1>NMS REFINER</h1>

        <div class="titleLine"></div>

    </div>

    <p class="subtitle">
        REFINING DATABASE
    </p>

    <!-- 検索 -->
    <section class="searchArea">

        <div class="searchLabel">
            RESOURCE INPUT
        </div>

        <input
            id="searchBox"
            type="text"
            placeholder="Enter the resource name.">

    </section>

    <!-- 検索結果カード -->
    <section id="resultArea">

        <div id="resultCard">

            <div id="itemHeader">
                SEARCH RESULT
            </div>

            <div id="itemBody">

                <p class="resultMessage">
                    Please enter the resource name and press Enter.

                </p>

            </div>

        </div>

    </section>

</main>

<footer>

    <div>
        DATABASE READY
    </div>

    <div>
        VERSION 0.43
    </div>

</footer>

</div>

<script src="script.js"></script>

</body>
</html>
